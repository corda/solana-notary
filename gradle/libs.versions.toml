[versions]
kotlin-main = "2.2.20"
kotlin-corda = "1.9.25"
solana4j = "1.2.2"
jackson = "2.17.2"
kotlinpoet = "2.2.0"
guava = "33.5.0-jre"
bouncycastle = "2.73.9"
picocli = "3.9.6"
slf4j = "2.0.17"
logback = "1.5.20"
junit-jupiter = "6.0.0"
assertj = "3.27.6"
artifactory = "6.0.2"
detekt = "2.0.0-alpha.1"

[libraries]
picocli = { module = "info.picocli:picocli", version.ref = "picocli" }
jackson-dataformat-yaml = { module = "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml", version.ref = "jackson" }
jackson-kotlin = { module = "com.fasterxml.jackson.module:jackson-module-kotlin", version.ref = "jackson" }
bouncycastle = { module = "org.bouncycastle:bcprov-lts8on", version.ref = "bouncycastle" }
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
logback = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
solana4j-core = { module = "com.lmax:solana4j", version.ref = "solana4j" }
solana4j-rpc = { module = "com.lmax:solana4j-json-rpc", version.ref = "solana4j" }
guava = { module = "com.google.guava:guava", version.ref = "guava" }
kotlinpoet = { module = "com.squareup:kotlinpoet", version.ref = "kotlinpoet" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }
assertj-core = { module = "org.assertj:assertj-core", version.ref = "assertj" }

[plugins]
shadow = { id = "com.gradleup.shadow", version = "9.2.2" }
