plugins {
    id 'org.jetbrains.kotlin.jvm'
    id 'application'
    id 'com.github.johnrengelman.shadow'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
    mainClass = 'net.corda.solana.notary.admincli.SolanaAggregatorCliKt'
}

dependencies {
    implementation project(':clients:kotlin')
    implementation "net.corda:corda-tools-cliutils:$cordaVersion"
    implementation "info.picocli:picocli:$picocliVersion"
    implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:$jacksonVersion"
    implementation "com.fasterxml.jackson.module:jackson-module-kotlin:$jacksonVersion"
    implementation "org.bouncycastle:bcprov-lts8on:$bouncycastleVersion"

    runtimeOnly "ch.qos.logback:logback-classic:$logbackVersion"

    testImplementation "org.jetbrains.kotlin:kotlin-test"
}

shadowJar {
    manifest {
        attributes 'Implementation-Version': archiveVersion
    }
}

test {
    useJUnitPlatform()
}
